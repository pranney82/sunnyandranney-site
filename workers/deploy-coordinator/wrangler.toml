name = "deploy-coordinator"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[durable_objects]
bindings = [
  { name = "DEPLOY_COORDINATOR", class_name = "DeployCoordinator" }
]

[[migrations]]
tag = "v1"
new_classes = ["DeployCoordinator"]

# CF_DEPLOY_HOOK_URL set via:
# wrangler secret put CF_DEPLOY_HOOK_URL --config workers/deploy-coordinator/wrangler.toml
